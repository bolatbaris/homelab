# Dev-only overrides (macOS). Auto-merged over docker-compose.yml by
# podman-compose / docker-compose. MUST be absent in production — see
# deployment.md step 5 (`rm -f docker-compose.override.yml`) to preserve the
# zero-ports principle. Scoped to Mattermost only; other services' dev port
# mappings can be re-added here if local access to them is wanted.
services:
  mattermost:
    ports:
      - "8065:8065"
    environment:
      # Dev login over plain http://localhost needs SiteURL to match the access
      # URL — otherwise Mattermost issues a Secure cookie that a plain-HTTP
      # localhost session can't return, and login fails. Prod keeps the https
      # value from docker-compose.yml / .env.
      - MM_SERVICESETTINGS_SITEURL=http://localhost:8065
