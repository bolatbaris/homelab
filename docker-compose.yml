version: "3.8"

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token $TUNNEL_TOKEN
    env_file:
      - .env
    networks:
      - homelab-net

networks:
  homelab-net:
    driver: bridge
