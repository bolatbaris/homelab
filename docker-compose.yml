version: "3.8"

services:
  cloudflared:
    image: docker.io/cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token $TUNNEL_TOKEN
    env_file:
      - .env
    networks:
      - homelab-net

  portainer:
    image: docker.io/portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    volumes:
      - ${PODMAN_SOCKET_PATH}:/var/run/docker.sock
      - ./data/portainer:/data
    networks:
      - homelab-net

  glances:
    image: docker.io/nicolargo/glances:latest
    container_name: glances
    restart: unless-stopped
    environment:
      - GLANCES_OPT=-w
    volumes:
      - /sys:/sys:ro
      - /run/udev:/run/udev:ro
      - ./data/monitor:/glances/conf:ro
    networks:
      - homelab-net

  gitea:
    image: docker.io/gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    environment:
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__SSH_DOMAIN=${BASE_DOMAIN}
    volumes:
      - ./data/gitea:/data
    ports:
      - "2222:22"
    networks:
      - homelab-net

  n8n:
    image: docker.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - WEBHOOK_URL=https://${N8N_SUBDOMAIN}.${BASE_DOMAIN}
    volumes:
      - ./data/n8n:/home/node/.n8n
    networks:
      - homelab-net

  adguard:
    image: docker.io/adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    ports:
      - "192.168.1.10:53:53/tcp"
      - "192.168.1.10:53:53/udp"
      - "3001:80"
    volumes:
      - ./data/adguard/conf:/opt/adguardhome/conf
      - ./data/adguard/work:/opt/adguardhome/work
    networks:
      - homelab-net

  mattermost:
    image: docker.io/mattermost/mattermost-team-edition:release-10.5
    container_name: mattermost
    restart: unless-stopped
    depends_on:
      mattermost-postgres:
        condition: service_healthy
    environment:
      - TZ=Europe/Istanbul
      - MM_SQLSETTINGS_DRIVERNAME=postgres
      - MM_SQLSETTINGS_DATASOURCE=postgres://mmuser:${MATTERMOST_DB_PASSWORD}@mattermost-postgres:5432/mattermost?sslmode=disable&connect_timeout=10
      - MM_SERVICESETTINGS_SITEURL=https://${MATTERMOST_SUBDOMAIN}.${BASE_DOMAIN}
      - MM_BLEVESETTINGS_INDEXDIR=/mattermost/bleve-indexes
      # --- security hardening ---
      - MM_TEAMSETTINGS_ENABLEOPENSERVER=false
      - MM_SERVICESETTINGS_ENABLEMULTIFACTORAUTHENTICATION=true
    volumes:
      - ./data/mattermost/config:/mattermost/config:rw
      - ./data/mattermost/data:/mattermost/data:rw
      - ./data/mattermost/logs:/mattermost/logs:rw
      - ./data/mattermost/plugins:/mattermost/plugins:rw
      - ./data/mattermost/client-plugins:/mattermost/client/plugins:rw
      - ./data/mattermost/bleve-indexes:/mattermost/bleve-indexes:rw
    networks:
      - homelab-net
    # NO ports: in base — tunnel reaches it internally as http://mattermost:8065

  mattermost-postgres:
    image: docker.io/postgres:15-alpine
    container_name: mattermost-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=mmuser
      - POSTGRES_PASSWORD=${MATTERMOST_DB_PASSWORD}
      - POSTGRES_DB=mattermost
    volumes:
      - ./data/mattermost/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmuser -d mattermost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homelab-net
    # NO ports: ever — database is internal-only, never exposed

  backup:
    build: ./backup
    container_name: backup
    restart: unless-stopped
    environment:
      - BACKUP_REQUIRE_MOUNT=${BACKUP_REQUIRE_MOUNT:-false}
    volumes:
      - ${BACKUP_DEST_PATH}:/backup
      - ./data/portainer:/sources/portainer:ro
      - ./data/monitor:/sources/monitor:ro
      - ./data/gitea:/sources/gitea:ro
      - ./data/n8n:/sources/n8n:ro
      - ./data/adguard:/sources/adguard:ro
      - ./data/mattermost:/sources/mattermost:ro
      # Mount future service data volumes read-only under /sources/<service>
      # e.g. - ./data/<service>:/sources/<service>:ro

networks:
  homelab-net:
    driver: bridge
