version: "3.8"

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token $TUNNEL_TOKEN
    env_file:
      - .env
    networks:
      - homelab-net

  backup:
    build: ./backup
    container_name: backup
    restart: unless-stopped
    volumes:
      - ${BACKUP_DEST_PATH}:/backup
      # Mount future service data volumes read-only under /sources/<service>
      # e.g. - ./data/gitea:/sources/gitea:ro

networks:
  homelab-net:
    driver: bridge
